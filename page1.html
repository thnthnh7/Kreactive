<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kreative — Step 01 · Category</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    /* Typography scale: --fs-* tokens (shared across steps) */
    :root {
      --fs-badge: 8px;
      --fs-micro: 9px;
      --fs-overline: 10px;
      --fs-caption: 11px;
      --fs-body-sm: 12px;
      --fs-body: 13px;
      --fs-lead: 14px;
      --fs-title-sm: 16px;
      --fs-title: 18px;
      --fs-title-lg: 20px;
      --fs-display: 28px;
      --fs-hero-logo: clamp(64px, 9vw, 112px);
      --fs-hero-tagline: clamp(13px, 1.4vw, 17px);
      --fs-preview-headline: clamp(var(--fs-lead), 3vw, var(--fs-title-lg));
      --fs-preview-desc: clamp(var(--fs-overline), 2.2vw, var(--fs-body));
      --fs-preview-cta: clamp(var(--fs-overline), 2vw, var(--fs-body-sm));
      --fs-h1: var(--fs-title-lg);
      --fs-h2: var(--fs-title);
      --fs-h3: var(--fs-title-sm);
      --fs-desc: var(--fs-body);
      --fs-desc-sm: var(--fs-caption);
    }
    /* STATE: READS nothing | WRITES category, hero */
    /* GUARD: none | NEXT: page2.html | BACK: index.html */

    :root {
      color-scheme: dark light;
      --text: var(--text-primary);
    }

    [data-theme="dark"],
    :root:not([data-theme]) {
      --bg: #0a0b0e;
      --bg-accent: radial-gradient(120% 80% at 50% 0%, rgba(255, 107, 107, 0.08) 0%, transparent 55%),
        radial-gradient(90% 60% at 100% 100%, rgba(125, 211, 252, 0.06) 0%, transparent 50%),
        #0a0b0e;
      --coral: #ff6b6b;
      --accent: #c4a5ff;
      --sage: #8fd9a8;
      --sky: #7dd3fc;
      --text-primary: #f4f4f5;
      --text-secondary: rgba(244, 244, 245, 0.72);
      --text-muted: rgba(244, 244, 245, 0.42);
      --border: rgba(255, 255, 255, 0.12);
      --cat-select-ring: rgba(244, 244, 245, 0.52);
      --cat-select-fill: rgba(255, 255, 255, 0.09);
      --cat-icon-bg: rgba(255, 255, 255, 0.08);
      --cat-icon-fg: rgba(244, 244, 245, 0.88);
      --surface: rgba(255, 255, 255, 0.04);
      --btn-primary-bg: linear-gradient(135deg, var(--coral) 0%, #ff8787 100%);
      --btn-primary-color: #0a0b0e;
      --btn-primary-shadow: 0 12px 32px rgba(255, 107, 107, 0.25);
      --btn-next-bg: linear-gradient(135deg, #ececf0 0%, #d9d9df 100%);
      --btn-next-color: #0a0b0e;
      --btn-next-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
      --toggle-bg: rgba(255, 255, 255, 0.06);
      --toggle-border: var(--border);
      --toggle-color: var(--text-secondary);
      --step-nav-active-fg: #f4f4f5;
      --step-nav-active-bg: rgba(255, 255, 255, 0.1);
      --step-nav-active-border: rgba(244, 244, 245, 0.38);
    }

    [data-theme="light"] {
      --bg: #f5f3ef;
      --bg-accent: radial-gradient(120% 80% at 50% 0%, rgba(255, 107, 107, 0.12) 0%, transparent 55%),
        radial-gradient(90% 60% at 100% 100%, rgba(125, 211, 252, 0.14) 0%, transparent 50%),
        #f5f3ef;
      --coral: #e85555;
      --accent: #8b6fd6;
      --sage: #4fa572;
      --sky: #3a9bc9;
      --text-primary: #1a1b1f;
      --text-secondary: rgba(26, 27, 31, 0.68);
      --text-muted: rgba(26, 27, 31, 0.45);
      --border: rgba(26, 27, 31, 0.12);
      --cat-select-ring: rgba(26, 27, 31, 0.42);
      --cat-select-fill: rgba(26, 27, 31, 0.07);
      --cat-icon-bg: rgba(26, 27, 31, 0.08);
      --cat-icon-fg: rgba(26, 27, 31, 0.72);
      --surface: rgba(255, 255, 255, 0.72);
      --btn-primary-bg: linear-gradient(135deg, var(--coral) 0%, #ff6b6b 100%);
      --btn-primary-color: #ffffff;
      --btn-primary-shadow: 0 12px 28px rgba(232, 85, 85, 0.22);
      --btn-next-bg: linear-gradient(135deg, #33343a 0%, #1a1b1f 100%);
      --btn-next-color: #fafafa;
      --btn-next-shadow: 0 10px 26px rgba(0, 0, 0, 0.18);
      --toggle-bg: rgba(255, 255, 255, 0.9);
      --toggle-border: rgba(26, 27, 31, 0.1);
      --toggle-color: var(--text-primary);
      --step-nav-active-fg: #1a1b1f;
      --step-nav-active-bg: rgba(26, 27, 31, 0.07);
      --step-nav-active-border: rgba(26, 27, 31, 0.24);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      font-family: "Montserrat", system-ui, -apple-system, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-accent);
      background-color: var(--bg);
      background-attachment: fixed;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    .k-page {
      display: flex;
      min-height: 100vh;
    }

    .k-sidebar {
      width: 72px;
      flex-shrink: 0;
      align-self: stretch;
      min-height: 0;
      border-right: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0 20px;
      gap: 0;
    }

    [data-theme="light"] .k-sidebar {
      background: rgba(255, 255, 255, 0.35);
    }

    .k-sidebar-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
    }

    .k-sidebar-btn svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .k-sidebar-btn:hover:not(:disabled) {
      color: var(--text-secondary);
      background: var(--surface);
      border-color: var(--border);
    }

    .k-sidebar-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .k-sidebar-btn.active {
      color: var(--step-nav-active-fg);
      background: var(--step-nav-active-bg);
      border-color: var(--step-nav-active-border);
    }

    .k-sidebar-btn.done:not(.active) {
      color: var(--text-secondary);
    }

    .k-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .k-topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.12);
    }

    [data-theme="light"] .k-topbar {
      background: rgba(255, 255, 255, 0.5);
    }

    .k-topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-self: start;
      min-width: 0;
    }

    .k-btn-ghost {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: var(--fs-overline);
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 18px;
      border-radius: 99px;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .k-btn-ghost:hover {
      color: var(--text-primary);
      border-color: var(--text-muted);
    }

    .k-tabs {
      display: flex;
      flex-wrap: nowrap;
      gap: 4px;
      align-items: center;
      justify-content: center;
      justify-self: center;
      min-width: 0;
      max-width: min(960px, 100%);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .k-tab {
      font-size: var(--fs-micro);
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 10px;
      border-radius: 99px;
      color: var(--text-muted);
      border: 1px solid transparent;
      background: transparent;
      cursor: default;
      pointer-events: none;
    }

    .k-tab.active {
      color: var(--text-primary);
      border-color: var(--border);
      background: rgba(255, 255, 255, 0.06);
    }

    [data-theme="light"] .k-tab.active {
      background: rgba(26, 27, 31, 0.05);
    }

    .k-topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-self: end;
      min-width: 0;
    }

    .k-btn-next {
      appearance: none;
      border: none;
      font-family: inherit;
      font-size: var(--fs-overline);
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 10px 22px;
      border-radius: 99px;
      color: var(--btn-next-color);
      background: var(--btn-next-bg);
      box-shadow: var(--btn-next-shadow);
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease, filter 0.2s ease;
    }

    .k-btn-next:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .k-btn-next:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      filter: none;
      box-shadow: none;
    }

    .k-stage {
      flex: 1;
      padding: 28px 24px 48px;
      overflow: auto;
    }

    .k-stage-inner {
      max-width: 960px;
      margin: 0 auto;
    }

    .k-section-title {
      font-size: var(--fs-caption);
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 0 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .k-badge {
      font-size: var(--fs-badge);
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 99px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.04);
    }

    [data-theme="light"] .k-badge {
      background: rgba(26, 27, 31, 0.04);
    }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 36px;
    }

    @media (max-width: 900px) {
      .cat-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 480px) {
      .cat-grid {
        grid-template-columns: 1fr;
      }
    }

    .k-card.cat-card {
      padding: 18px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    [data-theme="light"] .k-card.cat-card {
      background: rgba(255, 255, 255, 0.65);
    }

    .k-card.cat-card:hover {
      border-color: var(--text-muted);
      transform: translateY(-2px);
    }

    .k-card.cat-card.active {
      border-color: var(--cat-select-ring);
      background: var(--cat-select-fill);
    }

    .cat-icon {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cat-icon-bg);
      color: var(--cat-icon-fg);
      border: 1px solid var(--border);
    }

    .cat-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.1;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .cat-name {
      font-size: var(--fs-body);
      font-weight: 600;
      color: var(--text);
      margin: 10px 0 3px;
    }

    .cat-sub {
      font-size: var(--fs-caption);
      color: var(--text-muted);
      line-height: 1.35;
    }

    .k-upload {
      position: relative;
      border: 1px dashed var(--border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.02);
      min-height: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    [data-theme="light"] .k-upload {
      background: rgba(255, 255, 255, 0.4);
    }

    .k-upload:hover {
      border-color: var(--text-muted);
      background: rgba(255, 255, 255, 0.05);
    }

    .k-upload.has-preview {
      padding: 0;
      border-style: solid;
      overflow: hidden;
      cursor: default;
    }

    .k-upload input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .k-upload.has-preview input[type="file"] {
      display: none;
    }

    .k-upload-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
      color: var(--text-muted);
    }

    .k-upload-placeholder svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .k-upload-placeholder strong {
      font-size: var(--fs-body-sm);
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
    }

    .k-upload-placeholder span {
      font-size: var(--fs-overline);
      letter-spacing: 0.3px;
    }

    .k-upload-preview {
      position: relative;
      width: 100%;
      height: 140px;
    }

    .k-upload-preview img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
    }

    .k-upload-clear {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 32px;
      height: 32px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: rgba(10, 11, 14, 0.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #fff;
      font-size: var(--fs-lead);
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    [data-theme="light"] .k-upload-clear {
      background: rgba(255, 255, 255, 0.72);
      color: var(--text-primary);
    }

    .k-upload-clear:hover {
      transform: scale(1.05);
      background: rgba(10, 11, 14, 0.6);
    }

    .k-step-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--toggle-border);
      background: var(--toggle-bg);
      color: var(--toggle-color);
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    .k-step-icon:hover {
      background: var(--surface);
    }

    .k-step-icon svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .k-theme-toggle {
      position: static;
      flex-shrink: 0;
      margin-bottom: 12px;
    }

    .k-sidebar-steps {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="k-page">
    <aside class="k-sidebar" aria-label="Workflow">
      <button type="button" class="k-step-icon k-theme-toggle" id="themeToggle" aria-label="Toggle color theme">
        <svg id="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
        <svg id="icon-sun" viewBox="0 0 24 24" aria-hidden="true" style="display: none">
          <circle cx="12" cy="12" r="4" />
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
        </svg>
      </button>
      <div class="k-sidebar-steps" id="sidebar" aria-label="Workflow steps"></div>
    </aside>

    <main class="k-main">
      <nav class="k-topbar" aria-label="Step navigation">
        <div class="k-topbar-left">
          <button type="button" class="k-btn-ghost" id="btnBack">Back</button>
        </div>
        <div class="k-tabs" role="tablist" aria-label="Steps">
            <span class="k-tab active" role="tab" aria-selected="true">Category</span>
            <span class="k-tab" role="tab" aria-selected="false">Size</span>
            <span class="k-tab" role="tab" aria-selected="false">Theme</span>
            <span class="k-tab" role="tab" aria-selected="false">Fine Tune</span>
            <span class="k-tab" role="tab" aria-selected="false">Reference</span>
            <span class="k-tab" role="tab" aria-selected="false">Text &amp; Brand</span>
            <span class="k-tab" role="tab" aria-selected="false">Generate</span>
        </div>
        <div class="k-topbar-actions">
          <button type="button" class="k-btn-next" id="btnNext" disabled>Next</button>
        </div>
      </nav>

      <div class="k-stage">
        <div class="k-stage-inner">
          <h2 class="k-section-title">Product Category</h2>
          <div class="cat-grid" id="catGrid"></div>

          <h2 class="k-section-title">
            Product Photo
            <span class="k-badge">Optional</span>
          </h2>
          <div class="k-upload" id="uploadZone" role="button" tabindex="0" aria-label="Upload product photo">
            <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" />
            <div class="k-upload-placeholder" id="uploadPlaceholder">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                <circle cx="12" cy="13" r="4" />
              </svg>
              <strong>Upload product photo</strong>
              <span>JPG · PNG · WEBP · Max 10MB</span>
            </div>
            <div class="k-upload-preview" id="uploadPreview" hidden>
              <img id="previewImg" alt="Product preview" />
              <button type="button" class="k-upload-clear" id="btnClearUpload" aria-label="Remove photo">✕</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    (function () {
      var KREATIVE_KEY = "kreative_session";

      function getState() {
        try {
          var raw = localStorage.getItem(KREATIVE_KEY);
          return raw ? JSON.parse(raw) : {};
        } catch (e) {
          return {};
        }
      }

      function setState(partial) {
        var next = Object.assign({}, getState(), partial);
        localStorage.setItem(KREATIVE_KEY, JSON.stringify(next));
      }

      function clearState() {
        localStorage.removeItem(KREATIVE_KEY);
      }

      function syncIcons() {
        var moon = document.getElementById("icon-moon");
        var sun = document.getElementById("icon-sun");
        if (!moon || !sun) return;
        var isDark = document.documentElement.getAttribute("data-theme") !== "light";
        moon.style.display = isDark ? "block" : "none";
        sun.style.display = isDark ? "none" : "block";
      }

      function initTheme() {
        var stored = localStorage.getItem("kreativeTheme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = stored || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
        syncIcons();
      }

      var STEP_PAGES = [
        "page1.html",
        "page2.html",
        "page3.html",
        "page4.html",
        "page5.html",
        "page6.html",
        "page7.html"
      ];

      function stepReachable(stepIndex) {
        var s = getState();
        if (stepIndex <= 1) return true;
        if (stepIndex === 2) return !!s.category;
        if (stepIndex === 3) return !!s.category && !!s.size;
        if (stepIndex === 4) return !!s.category && !!s.size && !!s.theme;
        if (stepIndex === 5) return !!s.category && !!s.size && !!s.theme && !!s.fineTune;
        if (stepIndex === 6) {
          return !!s.category && !!s.size && !!s.theme && !!s.fineTune && !!s.reference;
        }
        if (stepIndex === 7) {
          return (
            !!s.category &&
            !!s.size &&
            !!s.theme &&
            !!s.fineTune &&
            !!s.reference &&
            !!s.textBrand
          );
        }
        return false;
      }

      var SIDEBAR_SVGS = [
        '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',
        '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 8h16M4 16h10"/><rect x="8" y="4" width="12" height="16" rx="2"/></svg>',
        '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>',
        '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 14h4v6H4zM10 8h4v12h-4zM16 4h4v16h-4z"/></svg>',
        '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10.5" r="1.5"/><path d="M21 17l-6-6-4 4-2-2-4 4"/></svg>',
        '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h10M4 18h14"/></svg>',
        '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l1.8 4.5L18 8l-4 2.5L15.5 15 12 12.5 8.5 15 10 10.5 6 8l4.2-1.5L12 2z"/></svg>'
      ];

      function renderSidebar(currentStep) {
        var el = document.getElementById("sidebar");
        if (!el) return;
        var s = getState();
        var html = "";
        for (var i = 0; i < 7; i++) {
          var stepNum = i + 1;
          var reachable = stepReachable(stepNum);
          var done =
            stepNum < currentStep ||
            (stepNum === 1 && !!s.category) ||
            (stepNum === 2 && !!s.size) ||
            (stepNum === 3 && !!s.theme) ||
            (stepNum === 4 && !!s.fineTune) ||
            (stepNum === 5 && !!s.reference) ||
            (stepNum === 6 && !!s.textBrand) ||
            (stepNum === 7 && !!s.generated);
          var classes = "k-sidebar-btn";
          if (stepNum === currentStep) classes += " active";
          if (done) classes += " done";
          var disabled = !reachable && stepNum !== currentStep;
          var label =
            "Go to step " +
            stepNum +
            (disabled ? " (locked)" : "") +
            ": " +
            ["Category", "Size", "Theme", "Fine Tune", "Reference", "Text & Brand", "Generate"][i];
          html +=
            '<button type="button" class="' +
            classes +
            '" data-step="' +
            stepNum +
            '"' +
            (disabled ? " disabled" : "") +
            ' aria-label="' +
            label +
            '" title="' +
            label +
            '">' +
            SIDEBAR_SVGS[i] +
            "</button>";
        }
        el.innerHTML = html;
        var buttons = el.querySelectorAll("[data-step]");
        for (var j = 0; j < buttons.length; j++) {
          buttons[j].addEventListener("click", onSidebarClick);
        }
      }

      function onSidebarClick(ev) {
        var btn = ev.currentTarget;
        if (btn.disabled) return;
        var step = parseInt(btn.getAttribute("data-step"), 10);
        if (!stepReachable(step)) return;
        var href = STEP_PAGES[step - 1];
        if (!href) return;
        var path = window.location.pathname || "";
        var at =
          path.slice(-href.length) === href ||
          path.replace(/\\/g, "/").split("/").pop() === href;
        if (!at) window.location.href = href;
      }

      var ICON_PATHS = {
        food:
          '<line x1="5" y1="2" x2="5" y2="7"/><path d="M3 2v3a2 2 0 0 0 4 0V2"/><line x1="5" y1="9" x2="5" y2="16"/><line x1="11" y1="2" x2="11" y2="16"/><path d="M9 2c0 0 4 1 4 5"/>',
        beauty:
          '<circle cx="9" cy="9" r="5.5"/><circle cx="9" cy="9" r="1.5"/><line x1="9" y1="2" x2="9" y2="4"/><line x1="14" y1="9" x2="16" y2="9"/>',
        health:
          '<rect x="4" y="7" width="10" height="9" rx="1"/><path d="M6 7V5a3 3 0 0 1 6 0v2"/><line x1="9" y1="10" x2="9" y2="13"/><line x1="7.5" y1="11.5" x2="10.5" y2="11.5"/>',
        fashion:
          '<path d="M6.5 2L3 6l3 1v9h6V7l3-1-3.5-4"/><path d="M6.5 2C6.5 4.5 11.5 4.5 11.5 2"/>',
        home: '<path d="M2 9L9 2l7 7"/><path d="M4 8v8h4v-5h2v5h4V8"/>',
        mother:
          '<circle cx="9" cy="5" r="2.5"/><path d="M5.5 15c0-2.5 1.5-4.5 3.5-4.5s3.5 2 3.5 4.5"/>',
        pet:
          '<ellipse cx="9" cy="12" rx="4.5" ry="3.5"/><circle cx="4.5" cy="7" r="1.5"/><circle cx="13.5" cy="7" r="1.5"/>',
        electronics:
          '<rect x="2" y="3" width="14" height="11" rx="1"/><line x1="5" y1="14" x2="5" y2="16"/><line x1="13" y1="14" x2="13" y2="16"/><line x1="3" y1="16" x2="15" y2="16"/>',
        sports: '<path d="M9 2L11 7H16L12 10.5L13.5 15.5L9 12.5L4.5 15.5L6 10.5L2 7H7Z"/>',
        stationery: '<path d="M12 3l3 3L6 15H3v-3L12 3z"/>',
        automotive:
          '<path d="M3 10l2-5h8l2 5"/><rect x="2" y="10" width="14" height="5" rx="1.5"/><circle cx="5.5" cy="15" r="1.5"/><circle cx="12.5" cy="15" r="1.5"/>',
        garden:
          '<path d="M9 16V9"/><path d="M9 9C7 5 3 4 3 4c0 4 2.5 6 6 6"/><path d="M9 9c2-4 6-5 6-5c0 4-2.5 6-6 6"/>',
        hobby:
          '<polygon points="9,2 10.8,7 16,7 11.8,10.3 13.4,15.5 9,12.5 4.6,15.5 6.2,10.3 2,7 7.2,7"/>'
      };

      var CATEGORIES = [
        { id: "01", name: "Food & Beverage", accent: "#FC8181", sub: "cuisine · drinks", group: "food_beverage", icon: "food" },
        { id: "02", name: "Beauty & Skincare", accent: "#E8A84A", sub: "cosmetics · wellness", group: "beauty_skincare", icon: "beauty" },
        { id: "03", name: "Health & Supplement", accent: "#E8A84A", sub: "nutrition · care", group: "health_supplement", icon: "health" },
        { id: "04", name: "Fashion & Apparel", accent: "#63B3ED", sub: "clothing · style", group: "fashion_apparel", icon: "fashion" },
        { id: "05", name: "Home & Living", accent: "#FC8181", sub: "decor · lifestyle", group: "home_living", icon: "home" },
        { id: "06", name: "Mother & Baby", accent: "#E8A84A", sub: "nurture · safety", group: "mother_baby", icon: "mother" },
        { id: "07", name: "Pet Care", accent: "#68D391", sub: "companions · health", group: "pet_care", icon: "pet" },
        { id: "08", name: "Electronics", accent: "#63B3ED", sub: "tech · gadgets", group: "electronics", icon: "electronics" },
        { id: "09", name: "Sports & Outdoor", accent: "#68D391", sub: "motion · nature", group: "sports_outdoor", icon: "sports" },
        { id: "10", name: "Stationery & Craft", accent: "#63B3ED", sub: "paper · creativity", group: "stationery_craft", icon: "stationery" },
        { id: "11", name: "Automotive", accent: "#A0AEC0", sub: "vehicles · parts", group: "automotive", icon: "automotive" },
        { id: "12", name: "Garden & Plant", accent: "#68D391", sub: "nature · growth", group: "garden_plant", icon: "garden" },
        { id: "13", name: "Hobby & Collectibles", accent: "#63B3ED", sub: "passion · rare finds", group: "hobby_collectibles", icon: "hobby" }
      ];

      function categorySvg(iconKey) {
        var inner = ICON_PATHS[iconKey] || ICON_PATHS.hobby;
        return (
          '<svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.1">' + inner + "</svg>"
        );
      }

      var activeId = null;
      var heroB64 = null;
      var heroMime = null;

      function setNextEnabled(on) {
        var next = document.getElementById("btnNext");
        if (!next) return;
        next.disabled = !on;
      }

      function selectCategory(id) {
        activeId = id;
        var cards = document.querySelectorAll(".cat-card");
        for (var i = 0; i < cards.length; i++) {
          var match = cards[i].getAttribute("data-id") === id;
          cards[i].classList.toggle("active", match);
          cards[i].setAttribute("aria-pressed", match ? "true" : "false");
        }
        setNextEnabled(!!id);
        renderSidebar(1);
      }

      function renderCategoryGrid() {
        var grid = document.getElementById("catGrid");
        if (!grid) return;
        var html = "";
        for (var i = 0; i < CATEGORIES.length; i++) {
          var c = CATEGORIES[i];
          html +=
            '<div class="k-card cat-card" data-id="' +
            c.id +
            '" role="button" tabindex="0" aria-pressed="false">' +
            '<div class="cat-icon">' +
            categorySvg(c.icon) +
            "</div>" +
            '<div class="cat-name">' +
            c.name +
            "</div>" +
            '<div class="cat-sub">' +
            c.sub +
            "</div></div>";
        }
        grid.innerHTML = html;
        var nodes = grid.querySelectorAll(".cat-card");
        for (var j = 0; j < nodes.length; j++) {
          nodes[j].addEventListener("click", function (ev) {
            var id = ev.currentTarget.getAttribute("data-id");
            selectCategory(id);
          });
          nodes[j].addEventListener("keydown", function (ev) {
            if (ev.key === "Enter" || ev.key === " ") {
              ev.preventDefault();
              var id = ev.currentTarget.getAttribute("data-id");
              selectCategory(id);
            }
          });
        }
      }

      function showHeroPreview() {
        var zone = document.getElementById("uploadZone");
        var ph = document.getElementById("uploadPlaceholder");
        var prev = document.getElementById("uploadPreview");
        var img = document.getElementById("previewImg");
        if (!zone || !ph || !prev || !img) return;
        if (heroB64 && heroMime) {
          zone.classList.add("has-preview");
          ph.hidden = true;
          prev.hidden = false;
          img.src = "data:" + heroMime + ";base64," + heroB64;
        } else {
          zone.classList.remove("has-preview");
          ph.hidden = false;
          prev.hidden = true;
          img.removeAttribute("src");
        }
      }

      function onFileSelected(file) {
        if (!file) return;
        var okTypes = ["image/jpeg", "image/png", "image/webp"];
        if (okTypes.indexOf(file.type) === -1) {
          alert("Please choose a JPG, PNG, or WEBP image.");
          return;
        }
        if (file.size > 10 * 1024 * 1024) {
          alert("File must be 10MB or smaller.");
          return;
        }
        var reader = new FileReader();
        reader.onload = function () {
          var res = reader.result;
          if (typeof res !== "string") return;
          var comma = res.indexOf(",");
          heroB64 = comma >= 0 ? res.slice(comma + 1) : res;
          heroMime = file.type;
          showHeroPreview();
        };
        reader.readAsDataURL(file);
      }

      function clearHero() {
        heroB64 = null;
        heroMime = null;
        var input = document.getElementById("fileInput");
        if (input) input.value = "";
        showHeroPreview();
      }

      function restoreFromState() {
        var s = getState();
        if (s.category && s.category.id) {
          activeId = s.category.id;
          selectCategory(activeId);
        }
        if (s.hero && s.hero.b64 && s.hero.mime) {
          heroB64 = s.hero.b64;
          heroMime = s.hero.mime;
          showHeroPreview();
        }
      }

      document.getElementById("btnBack").addEventListener("click", function () {
        window.location.href = "index.html";
      });

      document.getElementById("btnNext").addEventListener("click", function () {
        if (!activeId) return;
        var cat = null;
        for (var i = 0; i < CATEGORIES.length; i++) {
          if (CATEGORIES[i].id === activeId) {
            cat = CATEGORIES[i];
            break;
          }
        }
        if (!cat) return;
        setState({
          category: { id: cat.id, name: cat.name, accent: cat.accent, group: cat.group },
          hero: heroB64 ? { b64: heroB64, mime: heroMime } : null
        });
        window.location.href = "page2.html";
      });

      var fileInput = document.getElementById("fileInput");
      fileInput.addEventListener("change", function () {
        var f = fileInput.files && fileInput.files[0];
        onFileSelected(f);
      });

      document.getElementById("btnClearUpload").addEventListener("click", function (e) {
        e.stopPropagation();
        clearHero();
      });

      initTheme();
      renderCategoryGrid();
      restoreFromState();
      if (!activeId) {
        renderSidebar(1);
        setNextEnabled(false);
      }

      var toggle = document.getElementById("themeToggle");
      if (toggle) {
        toggle.addEventListener("click", function () {
          var next = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", next);
          localStorage.setItem("kreativeTheme", next);
          syncIcons();
        });
      }

      window.getState = getState;
      window.setState = setState;
      window.clearState = clearState;
    })();
  </script>
</body>
</html>
